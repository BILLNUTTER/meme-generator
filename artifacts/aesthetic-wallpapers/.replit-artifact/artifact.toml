kind = "web"
previewPath = "/"
title = "Aesthetic Wallpapers"
version = "1.0.0"
id = "artifacts/aesthetic-wallpapers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20776

[services.development]
run = "pnpm --filter @workspace/aesthetic-wallpapers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aesthetic-wallpapers", "run", "build" ]
publicDir = "artifacts/aesthetic-wallpapers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20776"
BASE_PATH = "/"
